services:
  postgres:
    image: postgres:16-alpine
    container_name: kozat-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: kozat
      POSTGRES_PASSWORD: kozat123
      POSTGRES_DB: kozat_online
    volumes:
      - kozat_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kozat -d kozat_online"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  kozat_pg_data:
